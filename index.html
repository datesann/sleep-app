<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>睡眠管理アプリ - スタンプ機能</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <h1>睡眠管理アプリ</h1>

    <div class="stamp-area">
        <h3>スタンプ数: <span id="stamp-count">0</span> 個</h3>
    </div>

    <div class="target-setting">
        <h3>起床目標時間の設定</h3>
        <input type="time" id="target-time-input" value="00:00">
        <button id="set-target-btn">目標を保存</button>
        <button id="clear-target-btn">目標を削除</button>
        <p id="current-target-display">現在の目標: 未設定</p>
    </div>

    <hr>

    <div class="button-group">
        <button id="start-btn">計測を開始する</button>
        <button id="end-btn" disabled>計測を終了する</button>
    </div>

    <div class="result-area">
        <p id="start-time-display">就寝時間: --:--:--</p>
        <p id="end-time-display">起床時間: --:--:--</p>
        <h2 id="duration-display">睡眠時間: --時間 --分 --秒</h2>
        
        <p id="feedback-message" style="font-size: 1.2em; font-weight: bold;"></p>
        <p id="error-message" class="error"></p>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
